name: nutrilens_mobile_app
description: Mobile application for food recognition and nutrition analysis powered by AI.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  go_router: ^14.6.1
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  cached_network_image: ^3.4.1
  permission_handler: ^11.3.1
  intl: ^0.20.1
  flutter_dotenv: ^5.2.1
  mobile_scanner: ^7.2.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.2

  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter_launcher_icons:
  image_path: assets/brand/watermarked_img_14021551352114865219.png
  android: true
  ios: true
  adaptive_icon_background: '#F8F9FA'
  adaptive_icon_foreground: assets/brand/watermarked_img_14021551352114865219.png
  adaptive_icon_foreground_inset: 16
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/brand/
